services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mifin
      POSTGRES_PASSWORD: mifin
      POSTGRES_DB: mifin
    ports: ["5435:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
    ports: ["6381:6379"]
volumes:
  pgdata: