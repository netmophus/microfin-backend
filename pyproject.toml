# Configuration des outils uniquement. Les dépendances restent gérées par
# requirements-lock.txt : ce fichier ne rend pas le projet installable.

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["alembic/versions", ".venv"]

[tool.ruff.lint]
select = [
    "E", "W",    # pycodestyle
    "F",         # pyflakes
    "I",         # isort
    "N",         # pep8-naming
    "UP",        # pyupgrade
    "B",         # bugbear
    "C4",        # comprehensions
    "SIM",       # simplify
    "DTZ",       # datetimes naïfs interdits (dates d'écriture comptable)
    "RUF",
]

[tool.ruff.lint.per-file-ignores]
# Les modèles y sont importés uniquement pour peupler Base.metadata (autogenerate),
# donc "inutilisés" (F401) ; et parfois après la config Alembic (E402).
"alembic/env.py" = ["E402", "F401"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
mypy_path = "."
files = ["app", "tests"]
warn_unreachable = true
show_error_codes = true

[[tool.mypy.overrides]]
module = ["dramatiq.*"]
ignore_missing_imports = true

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q --strict-markers --strict-config"
markers = [
    "integration: test nécessitant PostgreSQL/Redis (docker compose up)",
]
